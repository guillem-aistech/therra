name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generates src/routeTree.gen.ts (gitignored) and validates the
      # production build before typecheck/tests run against it.
      - name: Build
        run: pnpm build

      - name: Lint & typecheck
        run: pnpm check

      - name: Test
        run: pnpm test
